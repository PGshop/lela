                    <p>关于提款时扣除的 25% 税款，我需要向您说明：这笔钱不是交给 PG 公司的。</p>
                    <p>PG 是一家在美国合法注册的公司（科罗拉多州，编号 20181650293），当我们向美国境外（包括巴布亚新几内亚）的员工支付劳动报酬时，根据美国国内税收法（Internal Revenue Code），PG 有法定的预扣税义务。也就是说，我们必须按法律规定的比例，从您的收入中预扣一部分，并直接上缴给美国国税局（IRS），最终进入美国财政部。PG 作为代扣代缴方，一分钱也不留。</p>

            header.className = 'category-header';
            const titleSpan = document.createElement('span');
            titleSpan.className = 'category-title';
            titleSpan.textContent = cat.name;
            const icon = document.createElement('span');
            icon.className = 'collapse-icon';
            icon.textContent = '▶';
            header.appendChild(titleSpan);
            header.appendChild(icon);
            const grid = document.createElement('div');
            grid.className = 'toc-grid collapsed';
            for (const id of cat.items) {
                const item = document.createElement('div');
                item.className = 'toc-item';
                item.textContent = ARTICLES[id].title;
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const targetPage = getPageOfCard(id);
                    if (targetPage !== currentPage) goToPage(targetPage, id);
                    else {
                        const el = document.getElementById(`card-${id}`);
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
                grid.appendChild(item);
            }
            header.addEventListener('click', () => {
                grid.classList.toggle('collapsed');
                icon.textContent = grid.classList.contains('collapsed') ? '▶' : '▼';
            });
            catDiv.appendChild(header);
            catDiv.appendChild(grid);
            tocContainer.appendChild(catDiv);
        }
    }

    function showDetail(id) {
        savedScrollPosition = window.scrollY;
        const article = ARTICLES[id];
        if (!article) return;
        detailContentDiv.innerHTML = `<div class="detail-title">${article.title}</div><div class="detail-meta">📌 ${article.meta}</div><div class="detail-text">${article.content}</div>`;
        homeContainer.classList.add('hidden');
        detailContainer.classList.remove('hidden');
        window.scrollTo({ top: 0 });
        if (history.pushState) history.pushState({ view: 'detail', id }, '', `#${id}`);
    }

    function backToHome() {
        detailContainer.classList.add('hidden');
        homeContainer.classList.remove('hidden');
        setTimeout(() => window.scrollTo({ top: savedScrollPosition }), 10);
        if (location.hash) history.replaceState(null, '', ' ');
    }

    const themeBtn = document.getElementById('themeToggle');
    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        themeBtn.textContent = document.body.classList.contains('dark') ? '☀️ Mode clair' : '🌓 Mode sombre';
    });
    const goTop = document.getElementById('goTopBtn');
    window.addEventListener('scroll', () => goTop.classList.toggle('show', window.scrollY > 300));
    goTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    window.addEventListener('popstate', () => {
        if (!detailContainer.classList.contains('hidden')) backToHome();
        else if (location.hash && location.hash.length > 1) showDetail(location.hash.slice(1));
    });
    backBtn.addEventListener('click', backToHome);
    generateTOC();
    renderCurrentPage();
    updatePagination();
    let guideVisible = false;
    toggleTocBtn.addEventListener('click', () => {
        guideVisible = !guideVisible;
        tocContent.classList.toggle('visible', guideVisible);
        toggleTocBtn.textContent = guideVisible ? '📁 Masquer le guide' : '📂 Afficher le guide';
    });
    prevBtn.addEventListener('click', () => { if (currentPage > 1) goToPage(currentPage - 1); });
    nextBtn.addEventListener('click', () => { if (currentPage < totalPages) goToPage(currentPage + 1); });
    if (location.hash && location.hash.length > 1) showDetail(location.hash.slice(1));
</script>
</body>
</html>
